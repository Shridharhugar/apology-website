<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For My Geethu ❤️</title>

    <meta name="description"
        content="A beautiful love story created with memories, photos and videos.">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================
                LOADING SCREEN
    =========================================== -->

    <div id="loader">

        <div class="loader-heart">
        </div>

        <h2 class="loader-text">
        </h2>

    </div>

    <!-- ==========================================
                BACKGROUND LAYERS
    =========================================== -->

    <div class="aurora"></div>

    <div class="sparkles"></div>

    <div class="hearts"></div>

    <div class="flowers"></div>

    <div class="butterflies"></div>

    <div class="cursor-glow"></div>

    <div class="confetti"></div>

    <div class="fireworks"></div>

    <div id="emojiBurstContainer"></div>

    <!-- ==========================================
                WELCOME PAGE
    =========================================== -->

    <section
        id="page1"
        class="page">

        <div class="card">

            <h3>Hello ❤️</h3>

            <h1>My Dearest Geethu</h1>

            <p class="subtitle">

                Every beautiful memory of my life
                has one thing in common...

                <br><br>

                <b>You.</b>

            </p>

            <button
                id="openBtn"
                aria-label="Open our memories">

                Open My Heart 💖

            </button>

        </div>

    </section>

    <!-- ==========================================
                GALLERY PAGE
    =========================================== -->

    <main>

        <section
            id="galleryPage"
            class="page hidden">

            <div class="card gallery-card">

                <!-- Memory Counter -->

                <div class="memory-header">

                    <span id="memoryCounter"></span>

                </div>

                <!-- Media -->

                <div id="mediaContainer"></div>

                <!-- Title -->

                <h2 id="memoryTitle"></h2>

                <!-- Story -->

                <p id="memoryMessage"></p>

                <!-- Progress -->

                <div class="progress-wrapper">

                    <div class="progress-track">

                        <div
                            id="progressFill"
                            class="progress-fill">

                        </div>

                    </div>

                </div>

                <!-- Quote -->

                <div
                    id="loveQuote"
                    class="floating-quote"></div>

                <!-- Navigation -->

                <div class="button-group">

                    <button
                        id="prevBtn"
                        aria-label="Previous Memory">

                        ⬅ Previous

                    </button>

                    <button
                        id="nextBtn"
                        aria-label="Next Memory">

                        Next ❤️

                    </button>

                </div>

            </div>

        </section>

    </main>

    <!-- ==========================================
                MUSIC PLAYER
    =========================================== -->

    <!-- ==========================================
        BACKGROUND MUSIC
========================================== -->

<audio
    id="bgMusic"
    preload="auto"
    loop>

    <source
        src="music/Ishq wala love.mp3"
        type="audio/mpeg">

</audio>

    <div class="music-player">

        <button
            id="musicBtn"
            class="music-btn"
            aria-label="Play or Pause Music">

            🎵

        </button>

    </div>

    <!-- ==========================================
                JAVASCRIPT
    =========================================== -->

    <script src="script.js"></script>

</body>

</html>
