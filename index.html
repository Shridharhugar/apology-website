<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For My Geethu ❤️</title>

    <meta name="description"
        content="A beautiful love story created with memories, photos and videos.">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ==========================================
                LOADING SCREEN
    =========================================== -->

    <div id="loader">

        <div class="loader-heart">
        </div>

        <h2 class="loader-text">
        </h2>

    </div>

    <!-- ==========================================
                BACKGROUND LAYERS
    =========================================== -->

    <div class="aurora"></div>

    <div class="sparkles"></div>

    <div class="hearts"></div>

    <div class="flowers"></div>

    <div class="butterflies"></div>

    <div class="cursor-glow"></div>

    <div class="confetti"></div>

    <div class="fireworks"></div>

    <div id="emojiBurstContainer"></div>

    <!-- ==========================================
                WELCOME PAGE
    =========================================== -->

    <section id="page1" class="page">

    <div class="welcome-card">

        <!-- Decorative Glow -->
        <div class="card-glow"></div>

        <!-- Floating Hearts -->
        <div class="floating-hearts">

            <span>❤</span>
            <span>💕</span>
            <span>❤</span>

        </div>

        <!-- Hello -->

        <h3 class="welcome-text">

            HELLO ❤️

        </h3>

        <!-- Decorative Ornament -->

        <div class="title-decoration">

            <span></span>

            <div class="heart-icon">

                ❤

            </div>

            <span></span>

        </div>

        <!-- Main Heading -->

        <h1 class="main-title">

            My Dearest Geethu

        </h1>

        <!-- Divider -->

        <div class="luxury-divider">

            <span></span>

            <div class="divider-heart">

                ❤

            </div>

            <span></span>

        </div>

        <!-- Subtitle -->

        <p class="subtitle">

            Every beautiful memory of my life has one thing in common...

        </p>

        <!-- Highlight -->

        <div class="highlight-text">

            👉 <span>It's You</span>

        </div>

        <!-- Button -->

        <button
            id="openBtn"
            class="heart-button"
            aria-label="Open our memories">

            <span class="button-heart">

                ♡

            </span>

            <span>

                Open My Heart 💖

            </span>

        </button>

        <!-- Bottom Wave -->

        <div class="bottom-wave">

            <div class="wave1"></div>

            <div class="wave2"></div>

            <div class="wave3"></div>

        </div>

    </div>

</section>

    <!-- ==========================================
                GALLERY PAGE
    =========================================== -->

    <main>

        <section
            id="galleryPage"
            class="page hidden">

            <div class="card gallery-card">

                <!-- Memory Counter -->

                <div class="memory-header">

                    <span id="memoryCounter"></span>

                </div>

                <!-- Media -->

                <div id="mediaContainer"></div>

                <!-- Title -->

                <h2 id="memoryTitle"></h2>

                <!-- Story -->

                <p id="memoryMessage"></p>

                <!-- Progress -->

                <div class="progress-wrapper">

                    <div class="progress-track">

                        <div
                            id="progressFill"
                            class="progress-fill">

                        </div>

                    </div>

                </div>

                <!-- Quote -->

                <div
                    id="loveQuote"
                    class="floating-quote"></div>

                <!-- Navigation -->

                <div class="button-group">

                    <button
                        id="prevBtn"
                        aria-label="Previous Memory">

                        ⬅ Previous

                    </button>

                    <button
                        id="nextBtn"
                        aria-label="Next Memory">

                        Next ❤️

                    </button>  

                </div>

            </div>

        </section>

        <section id="forgivePage" class="page hidden">

    <div class="card">

        <img
            src="gifs/peach-cat-cute.gif"
            class="sorry-cat">

        <h1>🥺 Please Forgive Me</h1>

        <div class="meter">

            <div id="meterFill"></div>

        </div>

        <h2 id="meterText">

            Forgiveness Loading...

        </h2>

        <button
            id="forgiveBtn"
            style="display:none;">

            ❤️ Forgive Me ❤️

        </button>

    </div>

</section>

    </main>

    <!-- ==========================================
                MUSIC PLAYER
    =========================================== -->

    <!-- ==========================================
        BACKGROUND MUSIC
========================================== -->

<audio
    id="bgMusic"
    preload="auto"
    loop>

    <source
        src="music/Ishq wala love.mp3"
        type="audio/mpeg">

</audio>

    <div class="music-player">

        <button
            id="musicBtn"
            class="music-btn"
            aria-label="Play or Pause Music">

            🎵

        </button>

    </div>

    <!-- ==========================================
                JAVASCRIPT
    =========================================== -->

    <script src="script.js"></script>

</body>

</html>
